version: 2

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '{src,tests}/**/*.ts'
      run: pnpm lint:fix
      stage_fixed: true
    format:
      glob: '**/*.{ts,json,md,yml,yaml}'
      run: pnpm format
      stage_fixed: true
    type-check:
      glob: '{src,tests}/**/*.ts'
      run: pnpm tsc -p tsconfig.vitest.json --noEmit
    test:
      glob: 'src/**/*.{test,spec}.ts'
      run: pnpm test --run
